<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" font-family="Segoe UI,Arial,sans-serif" font-size="11">
  <!-- Browser -->
  <rect x="10" y="30" width="100" height="60" rx="8" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5"/>
  <text x="60" y="54" text-anchor="middle" font-weight="700" fill="#1e40af">Frontend</text>
  <text x="60" y="70" text-anchor="middle" fill="#374151">Nginx</text>
  <text x="60" y="84" text-anchor="middle" fill="#6b7280" font-size="9">EC2 Instance</text>

  <!-- Arrow 1 -->
  <line x1="110" y1="60" x2="160" y2="60" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="135" y="54" text-anchor="middle" fill="#6b7280" font-size="9">HTTP :8080</text>

  <!-- Backend -->
  <rect x="160" y="30" width="100" height="60" rx="8" fill="#d1fae5" stroke="#065f46" stroke-width="1.5"/>
  <text x="210" y="54" text-anchor="middle" font-weight="700" fill="#065f46">Backend</text>
  <text x="210" y="70" text-anchor="middle" fill="#374151">Node.js</text>
  <text x="210" y="84" text-anchor="middle" fill="#6b7280" font-size="9">EC2 Instance</text>

  <!-- Arrow 2 -->
  <line x1="260" y1="60" x2="310" y2="60" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="285" y="54" text-anchor="middle" fill="#6b7280" font-size="9">TCP :3306</text>

  <!-- Database -->
  <rect x="310" y="30" width="100" height="60" rx="8" fill="#fce7f3" stroke="#9d174d" stroke-width="1.5"/>
  <text x="360" y="54" text-anchor="middle" font-weight="700" fill="#9d174d">Database</text>
  <text x="360" y="70" text-anchor="middle" fill="#374151">MySQL 8</text>
  <text x="360" y="84" text-anchor="middle" fill="#6b7280" font-size="9">EC2 Instance</text>

  <!-- AWS label -->
  <rect x="420" y="40" width="90" height="40" rx="6" fill="#ff9900" opacity="0.15" stroke="#ff9900" stroke-width="1"/>
  <text x="465" y="57" text-anchor="middle" font-weight="700" fill="#b45309" font-size="10">AWS Cloud</text>
  <text x="465" y="72" text-anchor="middle" fill="#b45309" font-size="9">3 EC2 Instances</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
