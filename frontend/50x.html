<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Error</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-size: 6rem;
      font-weight: 700;
      color: #ef4444;
      line-height: 1;
    }
    .title {
      font-size: 1.5rem;
      margin: 1rem 0 0.5rem;
    }
    .sub {
      color: #94a3b8;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">5XX</div>
    <div class="title">Server Error</div>
    <div class="sub">The backend service is unavailable. Please try again later.</div>
  </div>
</body>
</html>
